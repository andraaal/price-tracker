services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: no
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql

  app:
    build: ./backend
    container_name: app
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
    volumes:
      - ./backend:/app
      - cargo-target:/app/target
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
    ports:
      - "3000:3000"

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - app
    volumes:
      - ./frontend:/app
      - product-node-modules:/app/node_modules
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  cargo-target:
  cargo-registry:
  cargo-git:
  product-node-modules:
